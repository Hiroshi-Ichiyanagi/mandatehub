name: Release

# Publishes to PyPI when a GitHub Release is published.
#
# One-time setup (owner action — no secrets stored in the repo):
#   1. Create the `mandatehub` project on PyPI (or reserve the name).
#   2. Configure a PyPI "Trusted Publisher" (OIDC) pointing at this repo + this workflow
#      (owner/repo, workflow file `release.yml`, environment `pypi`). Docs:
#      https://docs.pypi.org/trusted-publishers/
#   3. Draft a GitHub Release with a tag like `v0.1.0`. Publishing it runs this workflow.
#
# No API token is needed — trusted publishing mints a short-lived OIDC token at run time.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build and metadata-check
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Verify the tests pass on the built package
        run: |
          python -m pip install "$(ls dist/*.whl)[test]"
          python -m pytest -q
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
