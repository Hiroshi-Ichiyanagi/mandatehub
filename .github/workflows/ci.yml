name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install (editable + test extra)
        run: pip install -e ".[test]"
      - name: Import smoke
        run: python -c "import mandatehub; print(mandatehub.__version__)"
      - name: Run test suite
        run: python -m pytest -q
      - name: Determinism / import-discipline guards ("verify me")
        run: python -m pytest tests/test_superrich_guards.py -v

  build:
    name: build + metadata check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build sdist + wheel and check metadata
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

  postgres:
    name: multi-worker (Postgres) integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mandatehub_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install (+ postgres extra + pytest)
        run: python -m pip install --upgrade pip && pip install -e ".[postgres,test]"
      - name: Postgres storage + concurrent-replay tests
        env:
          MANDATEHUB_TEST_PG: "host=127.0.0.1 port=5432 dbname=mandatehub_test user=postgres password=postgres"
        run: python -m pytest tests/test_postgres_storage.py -v

  examples:
    name: run all offline examples
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .
      - name: Offline examples (deterministic; no network)
        run: |
          python examples/intent_mandate_settlement.py
          python examples/best_execution_recapture.py
          python examples/session_key_submandate.py
          python examples/x402_facilitator.py
          python examples/x402_remote_settle.py
          python examples/x402_best_exec.py
      - name: Preflight — happy path exits 0 (StubSigner, offline)
        env:
          MANDATEHUB_FACILITATOR_URL: https://x402.org/facilitator
          MANDATEHUB_PAY_TO: "0x857b06519E91e3A54538791bDbb0E22373e36b66"
        run: python examples/x402_live_preflight.py
      - name: Preflight — bad config exits non-zero
        run: |
          set +e
          MANDATEHUB_FACILITATOR_URL=http://evil.example MANDATEHUB_PAY_TO=0x857b06519E91e3A54538791bDbb0E22373e36b66 python examples/x402_live_preflight.py && exit 1
          MANDATEHUB_FACILITATOR_URL=https://x402.org/facilitator MANDATEHUB_PAY_TO=banana python examples/x402_live_preflight.py && exit 1
          MANDATEHUB_FACILITATOR_URL=https://x402.org/facilitator MANDATEHUB_PAY_TO=0x857b06519E91e3A54538791bDbb0E22373e36b66 MANDATEHUB_AMOUNT=-5 python examples/x402_live_preflight.py && exit 1
          echo "all bad configs correctly rejected"
      - name: Cloudflare worker skeleton — compiles + vendor script works
        run: |
          python -m py_compile deploy/cloudflare/worker.py
          python -m py_compile examples/x402_pay.py deploy/local/operator.py deploy/local/backup.py deploy/local/verify_state.py deploy/local/monitor.py
          (cd deploy/cloudflare && sh vendor.sh)
          python -c "import sys; sys.path.insert(0,'deploy/cloudflare'); import mandatehub; print('vendored', mandatehub.__version__)"
